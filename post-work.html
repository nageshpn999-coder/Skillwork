<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Work | WorkPin</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html">←</a>
  <div class="brand" data-i="need_people"></div>
  <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
</div>

<div class="wrap">
  <h1 data-i="post_title"></h1>
  <p class="sub" data-i="post_sub"></p>

  <form id="eForm">
    <!-- Phase 3: GPS నుండి జిల్లా/ఏరియా auto-select బటన్ -->
    <button type="button" class="btn locbtn" id="useLocBtn"></button>
    <p class="note" id="locMsg" style="display:none;margin-top:6px"></p>

    <label data-i="biz_name"></label>
    <input type="text" id="ename" required data-i-ph="ph_bizname">

    <label data-i="phone"></label>
    <input type="tel" id="ephone" required maxlength="10" data-i-ph="ph_phone">

    <label data-i="district"></label>
    <select id="edistrict" required></select>

    <div id="mandalWrap">
      <label data-i="mandal"></label>
      <input type="text" id="emandal" data-i-ph="ph_mandal">
    </div>

    <div id="areaWrap" style="display:none">
      <label data-i="area"></label>
      <!-- Phase 3: area search box — టైప్ చేస్తే కింద dropdown filter అవుతుంది -->
      <input type="text" id="areaSearch" data-i-ph="search_area_ph" autocomplete="off" style="margin-bottom:8px">
      <select id="earea"></select>
      <!-- "Other Area" select చేస్తే మాత్రమే కనిపించే custom area box -->
      <input type="text" id="customArea" data-i-ph="enter_area_ph" autocomplete="off" style="display:none;margin-top:8px">
    </div>

    <label data-i="village"></label>
    <input type="text" id="evillage" required data-i-ph="ph_village">

    <div class="group-label" data-i="work_type"></div>
    <!-- Skill search — హైదరాబాద్ select చేసినప్పుడు మాత్రమే కనిపిస్తుంది -->
    <div id="skillFilterWrap" style="display:none">
      <input type="text" id="skillFilter" data-i-ph="skill_filter_ph" autocomplete="off" style="margin-bottom:8px">
    </div>
    <div id="eSkillBox"></div>

    <label data-i="how_many"></label>
    <input type="text" id="count" data-i-ph="ph_count">

    <label data-i="job_type_label"></label>
    <select id="jobType">
      <option value="any" data-i="job_any"></option>
      <option value="full" data-i="job_full"></option>
      <option value="part" data-i="job_part"></option>
    </select>

    <label data-i="when_need"></label>
    <input type="text" id="when" data-i-ph="ph_when">

    <label data-i="wage"></label>
    <input type="text" id="wage" data-i-ph="ph_wage">

    <label data-i="details"></label>
    <textarea id="details" data-i-ph="ph_details"></textarea>

    <button type="submit" class="btn terracotta" data-i="submit_post"></button>
    <p class="note" data-i="post_note"></p>
    <p class="note" data-i="post_expiry_note"></p>
    <!-- ⭐ Featured promo — OWNER_WHATSAPP నంబర్ set చేస్తేనే కనిపిస్తుంది -->
    <p class="note" id="featPromo" style="display:none"><a id="featPromoLink" target="_blank" style="color:var(--terracotta-dark);font-weight:700"></a></p>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/data.js"></script>
<script>
if(!getLang()) setLang('te');
applyLang();

// ⭐ Featured promo link — data.js లో OWNER_WHATSAPP నిజమైన నంబర్ పెడితేనే కనిపిస్తుంది
if(typeof OWNER_WHATSAPP!=='undefined' && OWNER_WHATSAPP && !OWNER_WHATSAPP.includes('X')){
  const p = document.getElementById('featPromo');
  const a = document.getElementById('featPromoLink');
  a.textContent = t('feat_promo');
  a.href = `https://wa.me/${OWNER_WHATSAPP}?text=${encodeURIComponent('Featured post కావాలి — WorkPin')}`;
  p.style.display = 'block';
}

const districtSel = document.getElementById('edistrict');
fillDistrictSelect(districtSel);
fillAreaSelect(document.getElementById('earea'));
setupHydAreaSwitch(districtSel, document.getElementById('mandalWrap'), document.getElementById('areaWrap'));

// ---- Phase 3: 🔍 Area search (Hyderabad only) ----
const areaSearchEl = document.getElementById('areaSearch');
const areaSel = document.getElementById('earea');
const customAreaEl = document.getElementById('customArea');

// "Other Area" select అయినప్పుడు మాత్రమే custom text box చూపించు
function syncCustomArea(){
  const isOther = areaSel.value===OTHER_AREA_TE;
  customAreaEl.style.display = isOther ? 'block' : 'none';
  if(!isOther) customAreaEl.value='';
}
areaSel.addEventListener('change', syncCustomArea);

areaSearchEl.addEventListener('input', ()=>{
  fillAreaSelect(areaSel, areaSearchEl.value);
  syncCustomArea();
});

// ---- Phase 3: 📍 Use My Current Location ----
const useLocBtn = document.getElementById('useLocBtn');
const locMsg = document.getElementById('locMsg');
useLocBtn.textContent = t('use_my_loc');

useLocBtn.addEventListener('click', async ()=>{
  useLocBtn.disabled = true;
  useLocBtn.textContent = t('loc_detecting');
  const loc = await getMyLocation();
  useLocBtn.disabled = false;
  useLocBtn.textContent = t('use_my_loc');
  locMsg.style.display = 'block';

  if(!loc){
    locMsg.textContent = t('loc_denied_msg');
    return;
  }

  const nd = nearestDistrict(loc.lat, loc.lng);
  if(nd){
    districtSel.value = nd.te;
    districtSel.dispatchEvent(new Event('change'));
  }
  if(nd && nd.te===HYD_TE){
    const na = nearestHydArea(loc.lat, loc.lng);
    if(na){
      areaSearchEl.value='';
      fillAreaSelect(areaSel);
      areaSel.value = na.te;   // GPS ఎప్పుడూ named area నే select చేస్తుంది
      syncCustomArea();
    }
  }
  locMsg.textContent = t('loc_set');
});

const eSelectedSkills = new Set();
const skillFilterWrap = document.getElementById('skillFilterWrap');
const skillFilterEl = document.getElementById('skillFilter');

function rebuildChips(){
  const isHyd = districtSel.value===HYD_TE;
  const groups = isHyd ? SKILL_GROUPS_URBAN : SKILL_GROUPS;
  // Skill search box అన్ని జిల్లాలకూ — rural లో professional skills search చేస్తేనే కనిపిస్తాయి
  skillFilterWrap.style.display = 'block';
  skillFilterEl.value='';
  buildSkillChips(document.getElementById('eSkillBox'), eSelectedSkills, groups, '', false);
}
districtSel.addEventListener('change', rebuildChips);
rebuildChips();

// టైప్ చేస్తుండగానే chips filter — హైదరాబాద్: urban list; ఇతర జిల్లాలు: local + professional (search లోనే)
skillFilterEl.addEventListener('input', ()=>{
  const isHyd = districtSel.value===HYD_TE;
  const f = skillFilterEl.value.trim();
  let groups;
  if(isHyd){
    groups = SKILL_GROUPS_URBAN;
  } else {
    groups = f ? [...SKILL_GROUPS, ...SKILL_GROUPS_URBAN] : SKILL_GROUPS;
  }
  buildSkillChips(document.getElementById('eSkillBox'), eSelectedSkills, groups, f, true);
});

document.getElementById('eForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const phone = cleanPhone(document.getElementById('ephone').value);
  if(phone.length!==10){ showToast(t('err_phone')); return; }
  if(eSelectedSkills.size===0){ showToast(t('err_worktype')); return; }

  const isHyd = districtSel.value===HYD_TE;
  const mandalVal = isHyd ? areaSel.value : document.getElementById('emandal').value.trim();
  // "Other Area" అయితే user టైప్ చేసిన పేరు customArea గా save
  const customAreaVal = (isHyd && areaSel.value===OTHER_AREA_TE) ? customAreaEl.value.trim() : '';

  const loc = await getMyLocation();

  const data = {
    name: document.getElementById('ename').value.trim(),
    phone: phone,
    district: districtSel.value,
    mandal: mandalVal,
    customArea: customAreaVal,
    village: document.getElementById('evillage').value.trim(),
    skills: Array.from(eSelectedSkills),
    count: document.getElementById('count').value.trim(),
    jobType: document.getElementById('jobType').value,
    when: document.getElementById('when').value.trim(),
    wage: document.getElementById('wage').value.trim(),
    details: document.getElementById('details').value.trim(),
    lat: loc ? loc.lat : null,
    lng: loc ? loc.lng : null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try{
    await db.collection('panipniWork').add(data);
    showToast(t('ok_post'));
    setTimeout(()=>{ window.location.href='find-workers.html'; }, 1200);
  }catch(err){
    console.error(err);
    showToast(t('err_generic'));
  }
});
</script>
</body>
</html>
