<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Work | Skillwork</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html">←</a>
  <div class="brand" data-i="need_people"></div>
  <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
</div>

<div class="wrap">
  <h1 data-i="post_title"></h1>
  <p class="sub" data-i="post_sub"></p>

  <form id="eForm">
    <!-- Phase 3: GPS నుండి జిల్లా/ఏరియా auto-select బటన్ -->
    <button type="button" class="btn locbtn" id="useLocBtn"></button>
    <p class="note" id="locMsg" style="display:none;margin-top:6px"></p>

    <label data-i="biz_name"></label>
    <input type="text" id="ename" required data-i-ph="ph_bizname">

    <label data-i="phone"></label>
    <input type="tel" id="ephone" required maxlength="10" data-i-ph="ph_phone">

    <label data-i="district"></label>
    <select id="edistrict" required></select>

    <div id="mandalWrap">
      <label data-i="mandal"></label>
      <input type="text" id="emandal" data-i-ph="ph_mandal">
    </div>

    <div id="areaWrap" style="display:none">
      <label data-i="area"></label>
      <!-- Phase 3: area search box — టైప్ చేస్తే కింద dropdown filter అవుతుంది -->
      <input type="text" id="areaSearch" data-i-ph="search_area_ph" autocomplete="off" style="margin-bottom:8px">
      <select id="earea"></select>
    </div>

    <label data-i="village"></label>
    <input type="text" id="evillage" required data-i-ph="ph_village">

    <div class="group-label" data-i="work_type"></div>
    <div id="eSkillBox"></div>

    <label data-i="how_many"></label>
    <input type="text" id="count" data-i-ph="ph_count">

    <label data-i="when_need"></label>
    <input type="text" id="when" data-i-ph="ph_when">

    <label data-i="wage"></label>
    <input type="text" id="wage" data-i-ph="ph_wage">

    <label data-i="details"></label>
    <textarea id="details" data-i-ph="ph_details"></textarea>

    <button type="submit" class="btn terracotta" data-i="submit_post"></button>
    <p class="note" data-i="post_note"></p>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/data.js"></script>
<script>
if(!getLang()) setLang('te');
applyLang();

const districtSel = document.getElementById('edistrict');
fillDistrictSelect(districtSel);
fillAreaSelect(document.getElementById('earea'));
setupHydAreaSwitch(districtSel, document.getElementById('mandalWrap'), document.getElementById('areaWrap'));

// ---- Phase 3: 🔍 Area search (Hyderabad only) ----
const areaSearchEl = document.getElementById('areaSearch');
areaSearchEl.addEventListener('input', ()=>{
  fillAreaSelect(document.getElementById('earea'), areaSearchEl.value);
});

// ---- Phase 3: 📍 Use My Current Location ----
const useLocBtn = document.getElementById('useLocBtn');
const locMsg = document.getElementById('locMsg');
useLocBtn.textContent = t('use_my_loc');

useLocBtn.addEventListener('click', async ()=>{
  useLocBtn.disabled = true;
  useLocBtn.textContent = t('loc_detecting');
  const loc = await getMyLocation();
  useLocBtn.disabled = false;
  useLocBtn.textContent = t('use_my_loc');
  locMsg.style.display = 'block';

  if(!loc){
    locMsg.textContent = t('loc_denied_msg');
    return;
  }

  const nd = nearestDistrict(loc.lat, loc.lng);
  if(nd){
    districtSel.value = nd.te;
    districtSel.dispatchEvent(new Event('change'));
  }
  if(nd && nd.te===HYD_TE){
    const na = nearestHydArea(loc.lat, loc.lng);
    if(na){
      areaSearchEl.value='';
      fillAreaSelect(document.getElementById('earea'));
      document.getElementById('earea').value = na.te;
    }
  }
  locMsg.textContent = t('loc_set');
});

const eSelectedSkills = new Set();
function rebuildChips(){
  const groups = districtSel.value===HYD_TE ? SKILL_GROUPS_URBAN : SKILL_GROUPS;
  buildSkillChips(document.getElementById('eSkillBox'), eSelectedSkills, groups);
}
districtSel.addEventListener('change', rebuildChips);
rebuildChips();

document.getElementById('eForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const phone = cleanPhone(document.getElementById('ephone').value);
  if(phone.length!==10){ showToast(t('err_phone')); return; }
  if(eSelectedSkills.size===0){ showToast(t('err_worktype')); return; }

  const isHyd = districtSel.value===HYD_TE;
  const mandalVal = isHyd ? document.getElementById('earea').value : document.getElementById('emandal').value.trim();

  const loc = await getMyLocation();

  const data = {
    name: document.getElementById('ename').value.trim(),
    phone: phone,
    district: districtSel.value,
    mandal: mandalVal,
    village: document.getElementById('evillage').value.trim(),
    skills: Array.from(eSelectedSkills),
    count: document.getElementById('count').value.trim(),
    when: document.getElementById('when').value.trim(),
    wage: document.getElementById('wage').value.trim(),
    details: document.getElementById('details').value.trim(),
    lat: loc ? loc.lat : null,
    lng: loc ? loc.lng : null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try{
    await db.collection('panipniWork').add(data);
    showToast(t('ok_post'));
    setTimeout(()=>{ window.location.href='find-workers.html'; }, 1200);
  }catch(err){
    console.error(err);
    showToast(t('err_generic'));
  }
});
</script>
</body>
</html>
