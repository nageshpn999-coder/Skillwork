<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Nearby | Skillwork</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html">←</a>
  <div class="brand" data-i="nearby_work"></div>
  <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
</div>

<div class="wrap">
  <p class="sub" data-i="list_sub_work"></p>

  <div class="locbox">
    <div class="locstatus" id="locStatus"></div>
    <div class="row" id="manualLocRow" style="display:none">
      <select id="myDistrict"></select>
      <input type="text" id="myMandal" data-i-ph="your_mandal">
    </div>
  </div>

  <!-- Smart Skill Search: name/skill మీద live search -->
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="skillSearch" autocomplete="off" data-i-ph="skill_search_ph">
      <button type="button" class="search-clear" id="searchClear">✕</button>
    </div>
    <div class="suggestions" id="sugBox"></div>
  </div>

  <div class="filters">
    <select id="fDistrict"></select>
    <select id="fRange"></select>
  </div>

  <div id="list" class="loading">...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/data.js"></script>
<script>
if(!getLang()) setLang('te');
applyLang();
document.getElementById('locStatus').textContent = t('loc_checking');

const fSel = document.getElementById('fDistrict');
const allOpt = document.createElement('option');
allOpt.value=''; allOpt.textContent=t('all_districts');
fSel.appendChild(allOpt);
fillDistrictSelect(fSel);

const mySel = document.getElementById('myDistrict');
const myOpt = document.createElement('option');
myOpt.value=''; myOpt.textContent=t('your_district');
mySel.appendChild(myOpt);
fillDistrictSelect(mySel);

// Distance range filter: All, 2, 5, 10, 20, 50, 100 KM
const rangeSel = document.getElementById('fRange');
[['',t('dist_all')],['2',t('within').replace('{n}','2')],['5',t('within').replace('{n}','5')],['10',t('within').replace('{n}','10')],['20',t('within').replace('{n}','20')],['50',t('within').replace('{n}','50')],['100',t('within').replace('{n}','100')]].forEach(([v,l])=>{
  const o=document.createElement('option'); o.value=v; o.textContent=l; rangeSel.appendChild(o);
});
rangeSel.addEventListener('change', ()=>render());

let allWork = [];
let myLoc = null;
let myManual = {district:'', mandal:''};

// ---- Smart Skill Search state & wiring ----
// Store Once → Reuse Many Times: Firestore ఒక్కసారే load,
// టైప్ చేసిన ప్రతిసారీ memory లోని allWork మీదే filter — Firebase reads పెరగవు.
let searchQuery = '';
const searchEl = document.getElementById('skillSearch');
const clearBtn = document.getElementById('searchClear');
const sugBox = document.getElementById('sugBox');

function renderSuggestions(){
  const sugs = skillSuggestions(searchEl.value);
  if(!sugs.length){ sugBox.classList.remove('show'); sugBox.innerHTML=''; return; }
  sugBox.innerHTML = sugs.map(s=>`<div class="sug">${escHtml(s)}</div>`).join('');
  sugBox.classList.add('show');
  sugBox.querySelectorAll('.sug').forEach(el=>{
    el.addEventListener('click', ()=>{
      searchEl.value = el.textContent;
      searchQuery = el.textContent;
      sugBox.classList.remove('show');
      clearBtn.classList.add('show');
      render();
    });
  });
}

searchEl.addEventListener('input', ()=>{
  searchQuery = searchEl.value;
  clearBtn.classList.toggle('show', !!searchQuery.trim());
  renderSuggestions();
  render();
});

clearBtn.addEventListener('click', ()=>{
  searchEl.value=''; searchQuery='';
  clearBtn.classList.remove('show');
  sugBox.classList.remove('show');
  render();
  searchEl.focus();
});

document.addEventListener('click', (e)=>{
  if(!e.target.closest('.search-wrap')) sugBox.classList.remove('show');
});

function render(){
  const d = fSel.value;
  let filtered = d ? allWork.filter(w=>w.district===d) : allWork.slice();

  // Smart search filter — name/skill మీద మాత్రమే
  filtered = filtered.filter(w=>matchesQuery(w, searchQuery));

  filtered = filtered.map(w=>{
    const item = {...w};
    if(myLoc && item.lat!=null && item.lng!=null){
      attachDistance(item, myLoc);
    } else {
      item._myVillage=''; item._myMandal=myManual.mandal; item._myDistrict=myManual.district;
      attachDistance(item, null);
    }
    return item;
  });

  const maxKm = parseFloat(rangeSel.value);
  if(!isNaN(maxKm)){
    filtered = filtered.filter(w=> (w._distKm!=null) && w._distKm <= maxKm);
  }

  filtered.sort((a,b)=> ((isFeatured(b)?1:0)-(isFeatured(a)?1:0)) || ((a._distKm||999) - (b._distKm||999)));

  const list = document.getElementById('list');
  if(filtered.length===0){
    const msg = searchQuery.trim() ? t('no_match') : t('empty_work');
    list.innerHTML = `<div class="empty"><span class="big">📭</span>${msg}</div>`;
    return;
  }
  list.innerHTML = filtered.map(w=>`
    <div class="card ${isFeatured(w)?'featured':''}">
      ${isFeatured(w)?`<span class="fbadge">${t('featured_badge')}</span>`:''}
      <b class="name">${highlightText(w.name, searchQuery)}</b>
      <div class="place">📍 ${escHtml(w.village)}, ${w.customArea ? escHtml(w.customArea) : areaLabel(w.mandal)}, ${districtLabel(w.district)}</div>
      <span class="dist ${w._distKm>30?'far':''}">${w._exact?'📏':'≈'} ${w._distText}</span>
      <div class="tags">${(w.skills||[]).map(s=>`<span class="tag">${highlightText(skillLabel(s), searchQuery)}</span>`).join('')}</div>
      ${w.count?`<div class="place">${t('people_needed')} ${escHtml(w.count)}</div>`:''}
      ${w.when?`<div class="place">${t('when_lbl')} ${escHtml(w.when)}</div>`:''}
      ${w.wage?`<div class="place">${t('wage_lbl')} ${escHtml(w.wage)}</div>`:''}
      ${w.details?`<div class="place">${escHtml(w.details)}</div>`:''}
      <div class="actions">
        <a class="call" href="tel:${w.phone}">${t('call')}</a>
        <a class="wa" target="_blank" href="${waLink(w.phone, t('wa_msg_work')+' — Skillwork')}"><svg viewBox="0 0 32 32" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M16.004 3.2c-7.06 0-12.8 5.74-12.8 12.8 0 2.26.59 4.46 1.71 6.4L3.2 28.8l6.58-1.67a12.74 12.74 0 0 0 6.22 1.6h.01c7.06 0 12.79-5.74 12.79-12.8s-5.73-12.73-12.79-12.73zm0 23.36h-.01a10.6 10.6 0 0 1-5.4-1.48l-.39-.23-3.9.99 1.04-3.8-.25-.4a10.55 10.55 0 0 1-1.63-5.64c0-5.87 4.78-10.64 10.65-10.64 2.84 0 5.51 1.11 7.52 3.12a10.57 10.57 0 0 1 3.11 7.53c0 5.87-4.77 10.55-10.74 10.55zm5.84-7.96c-.32-.16-1.89-.93-2.18-1.04-.29-.11-.5-.16-.72.16-.21.32-.82 1.04-1.01 1.25-.19.21-.37.24-.69.08-.32-.16-1.35-.5-2.57-1.59-.95-.85-1.59-1.9-1.78-2.22-.19-.32-.02-.49.14-.65.14-.14.32-.37.48-.56.16-.19.21-.32.32-.53.11-.21.05-.4-.03-.56-.08-.16-.72-1.73-.98-2.37-.26-.62-.52-.54-.72-.55h-.61c-.21 0-.56.08-.85.4-.29.32-1.12 1.09-1.12 2.66 0 1.57 1.14 3.09 1.3 3.3.16.21 2.25 3.44 5.45 4.82.76.33 1.36.53 1.82.67.77.24 1.46.21 2.01.13.61-.09 1.89-.77 2.15-1.52.27-.75.27-1.39.19-1.52-.08-.13-.29-.21-.61-.37z"/></svg><span>WhatsApp</span></a>
      </div>
      <div class="actions">
        <a class="map" target="_blank" href="${mapsLink(w)}">${t('open_map')}</a>
      </div>
    </div>
  `).join('');
}

fSel.addEventListener('change', render);
mySel.addEventListener('change', e=>{ myManual.district=e.target.value; render(); });
document.getElementById('myMandal').addEventListener('input', e=>{ myManual.mandal=e.target.value; render(); });

async function initLocation(){
  myLoc = await getMyLocation();
  const statusEl = document.getElementById('locStatus');
  if(myLoc){
    statusEl.textContent = t('loc_found');
  } else {
    statusEl.textContent = t('loc_notfound');
    document.getElementById('manualLocRow').style.display='flex';
  }
  render();
}

db.collection('panipniWork').orderBy('createdAt','desc').get().then(snap=>{
  allWork = snap.docs.map(d=>d.data());
  initLocation();
}).catch(err=>{
  console.error(err);
  document.getElementById('list').innerHTML = `<div class="empty"><span class="big">⚠️</span>${t('err_load')}</div>`;
});
</script>
</body>
</html>
