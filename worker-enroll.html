<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Skillwork</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html">←</a>
  <div class="brand" data-i="need_work"></div>
  <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
</div>

<div class="wrap">
  <h1 data-i="enroll_title"></h1>
  <p class="sub" data-i="enroll_sub"></p>

  <form id="wForm">
    <!-- Phase 3: GPS నుండి జిల్లా/ఏరియా auto-select బటన్ -->
    <button type="button" class="btn locbtn" id="useLocBtn"></button>
    <p class="note" id="locMsg" style="display:none;margin-top:6px"></p>

    <label data-i="your_name"></label>
    <input type="text" id="name" required data-i-ph="ph_name">

    <label data-i="phone"></label>
    <input type="tel" id="phone" required maxlength="10" data-i-ph="ph_phone">

    <label data-i="district"></label>
    <select id="district" required></select>

    <div id="mandalWrap">
      <label data-i="mandal"></label>
      <input type="text" id="mandal" data-i-ph="ph_mandal">
    </div>

    <div id="areaWrap" style="display:none">
      <label data-i="area"></label>
      <!-- Phase 3: area search box — టైప్ చేస్తే కింద dropdown filter అవుతుంది -->
      <input type="text" id="areaSearch" data-i-ph="search_area_ph" autocomplete="off" style="margin-bottom:8px">
      <select id="area"></select>
    </div>

    <label data-i="village"></label>
    <input type="text" id="village" required data-i-ph="ph_village">

    <div class="group-label" data-i="skills_label"></div>
    <!-- Skill search — హైదరాబాద్ select చేసినప్పుడు మాత్రమే కనిపిస్తుంది -->
    <div id="skillFilterWrap" style="display:none">
      <input type="text" id="skillFilter" data-i-ph="skill_filter_ph" autocomplete="off" style="margin-bottom:8px">
    </div>
    <div id="skillBox"></div>

    <label data-i="available"></label>
    <input type="text" id="available" data-i-ph="ph_available">

    <button type="submit" class="btn green" data-i="submit_enroll"></button>
    <p class="note" data-i="enroll_note"></p>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/data.js"></script>
<script>
if(!getLang()) setLang('te');
applyLang();

const districtSel = document.getElementById('district');
fillDistrictSelect(districtSel);
fillAreaSelect(document.getElementById('area'));
setupHydAreaSwitch(districtSel, document.getElementById('mandalWrap'), document.getElementById('areaWrap'));

// ---- Phase 3: 🔍 Area search (Hyderabad only) ----
// టైప్ చేసిన వెంటనే dropdown options filter అవుతాయి
const areaSearchEl = document.getElementById('areaSearch');
areaSearchEl.addEventListener('input', ()=>{
  fillAreaSelect(document.getElementById('area'), areaSearchEl.value);
});

// ---- Phase 3: 📍 Use My Current Location ----
const useLocBtn = document.getElementById('useLocBtn');
const locMsg = document.getElementById('locMsg');
useLocBtn.textContent = t('use_my_loc');

useLocBtn.addEventListener('click', async ()=>{
  useLocBtn.disabled = true;
  useLocBtn.textContent = t('loc_detecting');
  const loc = await getMyLocation();
  useLocBtn.disabled = false;
  useLocBtn.textContent = t('use_my_loc');
  locMsg.style.display = 'block';

  if(!loc){
    // GPS deny అయినా/దొరకకపోయినా — మాన్యువల్‌గా కొనసాగవచ్చు
    locMsg.textContent = t('loc_denied_msg');
    return;
  }

  // దగ్గరి జిల్లా auto-select
  const nd = nearestDistrict(loc.lat, loc.lng);
  if(nd){
    districtSel.value = nd.te;
    districtSel.dispatchEvent(new Event('change')); // area/mandal switch + chips rebuild
  }
  // హైదరాబాద్ అయితే దగ్గరి area కూడా auto-select
  if(nd && nd.te===HYD_TE){
    const na = nearestHydArea(loc.lat, loc.lng);
    if(na){
      areaSearchEl.value='';
      fillAreaSelect(document.getElementById('area'));
      document.getElementById('area').value = na.te;
    }
  }
  locMsg.textContent = t('loc_set');
});

const selectedSkills = new Set();
const skillFilterWrap = document.getElementById('skillFilterWrap');
const skillFilterEl = document.getElementById('skillFilter');

function rebuildChips(){
  const isHyd = districtSel.value===HYD_TE;
  const groups = isHyd ? SKILL_GROUPS_URBAN : SKILL_GROUPS;
  // Skill search box హైదరాబాద్‌కి మాత్రమే; వేరే జిల్లా అయితే hide + clear
  skillFilterWrap.style.display = isHyd ? 'block' : 'none';
  if(!isHyd) skillFilterEl.value='';
  // District మారింది → selections clear (preserveSelection=false)
  buildSkillChips(document.getElementById('skillBox'), selectedSkills, groups, '', false);
}
districtSel.addEventListener('change', rebuildChips);
rebuildChips();

// టైప్ చేస్తుండగానే chips filter — Firebase query లేదు, selections preserve
skillFilterEl.addEventListener('input', ()=>{
  buildSkillChips(document.getElementById('skillBox'), selectedSkills, SKILL_GROUPS_URBAN, skillFilterEl.value, true);
});

document.getElementById('wForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const phone = cleanPhone(document.getElementById('phone').value);
  if(phone.length!==10){ showToast(t('err_phone')); return; }
  if(selectedSkills.size===0){ showToast(t('err_skill')); return; }

  const isHyd = districtSel.value===HYD_TE;
  const mandalVal = isHyd ? document.getElementById('area').value : document.getElementById('mandal').value.trim();

  const loc = await getMyLocation();

  const data = {
    name: document.getElementById('name').value.trim(),
    phone: phone,
    district: districtSel.value,
    mandal: mandalVal,
    village: document.getElementById('village').value.trim(),
    skills: Array.from(selectedSkills),
    available: document.getElementById('available').value.trim(),
    lat: loc ? loc.lat : null,
    lng: loc ? loc.lng : null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try{
    await db.collection('panipniWorkers').add(data);
    showToast(t('ok_enroll'));
    setTimeout(()=>{ window.location.href='find-work.html'; }, 1200);
  }catch(err){
    console.error(err);
    showToast(t('err_generic'));
  }
});
</script>
</body>
</html>
